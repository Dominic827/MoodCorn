services:
  - type: web
    name: moodcorn-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITHUB_URL
        value: https://github.com/yourusername/moodcorn
    healthCheckPath: /api/health
